name: Auto Blog Draft

on:
  schedule:
    - cron: "0 4 * * 1,3,5"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Optional topic id from content/topics.json"
        required: false
        type: string
      topic:
        description: "Optional manual topic title"
        required: false
        type: string
      target_service:
        description: "Required service slug when using a manual topic"
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          BLOG_SUMMARY_PATH: blog-summary.md
          BLOG_META_PATH: blog-meta.json
        shell: bash
        run: |
          args=()

          if [ -n "${{ inputs.topic_id }}" ]; then
            args+=(--topic-id "${{ inputs.topic_id }}")
          fi

          if [ -n "${{ inputs.topic }}" ]; then
            args+=(--topic "${{ inputs.topic }}")
          fi

          if [ -n "${{ inputs.target_service }}" ]; then
            args+=(--target-service "${{ inputs.target_service }}")
          fi

          npm run generate:blog -- "${args[@]}"

      - name: Build static site
        run: npm run build

      - name: Read blog metadata
        id: blog_meta
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const meta = JSON.parse(fs.readFileSync("blog-meta.json", "utf8"));
          const date = new Date().toISOString().slice(0, 10);
          const output = [
            `date=${date}`,
            `slug=${meta.slug}`,
            `title=${meta.title.replace(/\r?\n/g, " ")}`,
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`);
          NODE

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog/ content/topics.json
          if git diff --staged --quiet; then
            echo "No blog changes to commit."
            exit 0
          fi
          git commit -m "Add generated blog post: ${{ steps.blog_meta.outputs.title }} [skip ci]"
          git push origin HEAD:main

      - name: Ensure Apache files are included
        run: |
          if [ -f public/.htaccess ]; then cp public/.htaccess out/.htaccess; fi
          if [ -f public/ads.txt ]; then cp public/ads.txt out/ads.txt; fi
          if [ -f public/robots.txt ]; then cp public/robots.txt out/robots.txt; fi
          if [ -f public/sitemap.xml ]; then cp public/sitemap.xml out/sitemap.xml; fi

      - name: Deploy to public_html
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.log
