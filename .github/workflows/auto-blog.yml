name: Auto Blog Draft

on:
  schedule:
    - cron: "0 4 * * 1,3,5"
  workflow_dispatch:
    inputs:
      topic_id:
        description: "Optional topic id from content/topics.json"
        required: false
        type: string
      topic:
        description: "Optional manual topic title"
        required: false
        type: string
      target_service:
        description: "Required service slug when using a manual topic"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.10.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate blog post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          BLOG_SUMMARY_PATH: blog-summary.md
          BLOG_META_PATH: blog-meta.json
        shell: bash
        run: |
          args=()

          if [ -n "${{ inputs.topic_id }}" ]; then
            args+=(--topic-id "${{ inputs.topic_id }}")
          fi

          if [ -n "${{ inputs.topic }}" ]; then
            args+=(--topic "${{ inputs.topic }}")
          fi

          if [ -n "${{ inputs.target_service }}" ]; then
            args+=(--target-service "${{ inputs.target_service }}")
          fi

          npm run generate:blog -- "${args[@]}"

      - name: Build static site
        run: npm run build

      - name: Read blog metadata
        id: blog_meta
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const meta = JSON.parse(fs.readFileSync("blog-meta.json", "utf8"));
          const date = new Date().toISOString().slice(0, 10);
          const output = [
            `date=${date}`,
            `slug=${meta.slug}`,
            `title=${meta.title.replace(/\r?\n/g, " ")}`,
          ].join("\n");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`);
          NODE

      - name: Create blog pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: blog/auto-${{ steps.blog_meta.outputs.date }}-${{ steps.blog_meta.outputs.slug }}
          delete-branch: true
          commit-message: "Add generated blog post: ${{ steps.blog_meta.outputs.title }}"
          title: "Draft blog: ${{ steps.blog_meta.outputs.title }}"
          body-path: blog-summary.md
          reviewers: ${{ github.repository_owner }}
          labels: automated-blog
          add-paths: |
            content/blog/**
            content/topics.json
